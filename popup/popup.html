<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QuickSteps</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div id="app">
      <header>
        <div class="header-left">
          <svg width="18" height="18" viewBox="0 0 48 48" fill="none">
            <polygon points="28,4 13,26 22,26 20,44 35,22 26,22" fill="white" />
          </svg>
          <span>QuickSteps</span>
        </div>
        <button id="btn-settings" title="Manage Quick Steps">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </button>
      </header>

      <div id="content">
        <div id="loading">
          <div class="spinner"></div>
          <span>Loading…</span>
        </div>

        <div id="steps-container" class="hidden"></div>

        <div id="empty-state" class="hidden">
          <div class="empty-icon">⚡</div>
          <p>No Quick Steps yet.</p>
          <p class="empty-sub">
            Create buttons that automate your email actions.
          </p>
          <button id="createFirstBtn" class="btn-primary">
            Create first Quick Step
          </button>
        </div>
      </div>

      <div id="status-bar" class="hidden"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
