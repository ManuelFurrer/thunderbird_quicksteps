<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QuickSteps — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>

  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">
            <svg width="16" height="16" viewBox="0 0 48 48">
              <polygon
                points="28,4 13,26 22,26 20,44 35,22 26,22"
                fill="#0078D4"
              />
            </svg>
            <span data-i18n-content="optionsSidebarTitle"></span>
          </div>
          <button id="btn-new-step" data-i18n-title="optionsNewStep">
            <span class="plus">+</span>
            <span data-i18n-content="optionsNewStep"></span>
          </button>
        </div>

        <div id="steps-list"></div>

        <div id="sidebar-empty" class="hidden">
          <p data-i18n-content="optionsNoStepsYet"></p>
          <p id="sidebar-empty-hint"></p>
        </div>
      </aside>

      <main id="editor-panel">
        <div id="editor-placeholder">
          <div class="placeholder-icon">⚡</div>
          <h2 data-i18n-content="optionsPlaceholderTitle"></h2>
          <p id="placeholder-select-hint"></p>
          <p class="hint" data-i18n-content="optionsPlaceholderHint"></p>
        </div>

        <div id="editor" class="hidden">
          <div class="editor-header">
            <div class="editor-title-block">
              <input
                type="text"
                id="step-name"
                data-i18n-placeholder="optionsStepNamePlaceholder"
                maxlength="60"
              />
              <div id="editor-preview-actions" class="preview-actions"></div>
            </div>
          </div>

          <div class="editor-body">
            <section class="section">
              <h3
                class="section-title"
                data-i18n-content="optionsSectionAppearance"
              ></h3>
              <div class="appearance-row">
                <div class="field-group">
                  <label data-i18n-content="optionsColorLabel"></label>
                  <div id="color-picker" class="color-picker"></div>
                  <div class="color-picker-container">
                    <label for="step-color" class="custom-color-picker">
                      <input type="color" id="step-color" value="#0078D4" />
                      <span
                        class="color-swatch"
                        id="color-swatch"
                        style="background-color: #0078d4"
                      ></span>
                    </label>
                  </div>
                </div>
              </div>
            </section>

            <section class="section">
              <h3 class="section-title">
                <span data-i18n-content="optionsSectionActions"></span>
                <span
                  class="section-hint"
                  data-i18n-content="optionsSectionActionsHint"
                ></span>
              </h3>
              <div id="actions-list"></div>
              <button
                id="btn-add-action"
                class="btn-add-action"
                data-i18n-content="optionsAddAction"
              ></button>
            </section>
          </div>
        </div>

        <div class="editor-footer">
          <button
            id="btn-delete-step"
            class="btn-danger"
            data-i18n-content="optionsDeleteStep"
          ></button>
          <div class="footer-right">
            <div id="toast" class="hidden"></div>
            <button
              id="btn-save"
              class="btn-primary"
              data-i18n-content="optionsSave"
            ></button>
          </div>
        </div>
      </main>
    </div>

    <div id="confirm-overlay" class="hidden">
      <div id="confirm-box">
        <p id="confirm-message"></p>
        <div class="confirm-btns">
          <button
            id="confirm-cancel"
            class="btn-secondary"
            data-i18n-content="optionsConfirmCancel"
          ></button>
          <button
            id="confirm-ok"
            class="btn-danger"
            data-i18n-content="optionsConfirmDelete"
          ></button>
        </div>
      </div>
    </div>

    <script src="options.js" type="module"></script>
  </body>
</html>
